<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadPredictor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="24" height="24" rx="4" fill="#cfd8e3"/>
                    <path d="M6 8h12l-4.5 5.5v4.5l-3 1.5v-6L6 8z" fill="#151b23"/>
                </svg>
                <span>LeadPredictor</span>
            </div>
        </header>

        <div class="main-layout">
            <aside class="sidebar">
                <div class="input-group">
                    <label>Language</label>
                    <select id="language">
                        <option>🇺🇸 English</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Currency</label>
                    <select id="currency">
                        <option>$ US Dollar</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Campaign Start</label>
                    <div class="date-input">
                        <input type="text" value="08-May-2026" readonly>
                        <span class="icon-calendar"></span>
                    </div>
                </div>

                <div class="input-group">
                    <label>Campaign End</label>
                    <div class="date-input">
                        <input type="text" value="04-Nov-2026" readonly>
                        <span class="icon-calendar"></span>
                    </div>
                </div>

                <div class="input-group">
                    <label>Total Revenue</label>
                    <div class="text-input relative">
                        <span class="prefix">$</span>
                        <input type="number" id="totalRevenue" value="10000">
                    </div>
                </div>

                <div class="input-group">
                    <label>Avg. Order Value</label>
                    <div class="text-input relative">
                        <span class="prefix">$</span>
                        <input type="number" id="avgOrderValue" value="1000">
                    </div>
                </div>
            </aside>

            <main class="content">
                <div class="top-row">
                    <div class="chart-panel">
                        <div class="chart-y-axis">
                            <span>1<div class="tick-y"></div></span>
                            <span>2<div class="tick-y"></div></span>
                            <span>3<div class="tick-y"></div></span>
                            <span>4<div class="tick-y"></div></span>
                            <span>5<div class="tick-y"></div></span>
                            <span>6<div class="tick-y"></div></span>
                            <div class="y-label">Months</div>
                        </div>
                        <div class="chart-area" id="chartArea">
                            <!-- Bars will be generated by JS -->
                        </div>
                        <div class="chart-x-axis">
                            <span><div class="tick"></div>0 people</span>
                            <span><div class="tick"></div>20 people</span>
                            <span><div class="tick"></div>40 people</span>
                            <span><div class="tick"></div>60 people</span>
                            <span><div class="tick"></div>80 people</span>
                            <span><div class="tick"></div>100 people</span>
                            <span><div class="tick"></div>120 people</span>
                        </div>
                    </div>

                    <div class="summary-cards">
                        <div class="card">
                            <div class="card-header">
                                <span class="icon">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="#ffffff">
                                        <path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
                                    </svg>
                                </span>
                                <span>Prospects</span>
                                <span class="percent">100%</span>
                            </div>
                            <div class="card-value" id="cardProspects">125</div>
                            <div class="card-bar-container"><div class="card-bar" style="width: 100%;"></div></div>
                        </div>

                        <div class="card">
                            <div class="card-header">
                                <span class="icon">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="#ffffff">
                                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                                    </svg>
                                </span>
                                <span>Leads</span>
                                <span class="percent" id="leadsPercent">20%</span>
                            </div>
                            <div class="card-value" id="cardLeads">25</div>
                            <div class="card-bar-container"><div class="card-bar" style="width: 20%;" id="leadsBarFill"></div></div>
                        </div>

                        <div class="card">
                            <div class="card-header">
                                <span class="icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="#ffffff">
                                        <path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94A5.01 5.01 0 0011 15.9V19H7v2h10v-2h-4v-3.1a5.01 5.01 0 003.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM7 10.82C5.84 10.4 5 9.3 5 8V7h2v3.82zM19 8c0 1.3-.84 2.4-2 2.82V7h2v1z"/>
                                    </svg>
                                </span>
                                <span>Customers</span>
                                <span class="percent" id="customersPercent">8%</span>
                            </div>
                            <div class="card-value" id="cardCustomers">10</div>
                            <div class="card-bar-container"><div class="card-bar" style="width: 8%;" id="customersBarFill"></div></div>
                        </div>
                    </div>
                </div>

                <div class="bottom-row">
                    <div class="slider-group">
                        <label>Lead Response Rate</label>
                        <input type="range" id="leadResponseRate" min="0" max="100" value="40" step="1">
                        <div class="slider-value" id="leadResponseValue">40.00%</div>
                    </div>

                    <div class="slider-group">
                        <label>Prospect Response Rate</label>
                        <input type="range" id="prospectResponseRate" min="0" max="100" value="20" step="1">
                        <div class="slider-value" id="prospectResponseValue">20.00%</div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
